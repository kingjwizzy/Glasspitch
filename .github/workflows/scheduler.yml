              --body "The scheduled **${JOB_NAME}** job failed. Run: ${RUN_URL}

          This issue is reused (commented on, not duplicated) for future failures of the same job, until it's closed."
          fi

  # ---- daily 05:45: nightly Elo probability snapshots (DB-only, no API) ------
  # v3 W5 (ARCHITECTURE.md §5, migration 0006) -- Gameweek Board / Fixture
  # Ticker data. Scheduled BEFORE fetch_fixtures' first 6-hourly sweep of the
  # day and fetch_predictions' 06:15 run so it snapshots off yesterday's fully
  # -settled results, not a same-day fixtures update still in flight.
  snapshot_probabilities:
    name: snapshot_probabilities (Gameweek Board / Fixture Ticker)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: glasspitch-scheduler-snapshot_probabilities
      cancel-in-progress: false
    if: >-
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'all' || inputs.job == 'snapshot_probabilities')) ||
      github.event.schedule == '45 5 * * *'
    permissions:
      contents: read
      issues: write
    # No API_FOOTBALL_KEY: this job never calls the football API (DB reads/writes only).
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'
          cache: pip
          cache-dependency-path: jobs/requirements.txt
      - run: pip install -r jobs/requirements.txt
      - name: Run snapshot_probabilities
        run: python -m jobs.snapshot_probabilities ${{ inputs.dry_run && '--dry-run' || '' }}
      - name: Alert on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_NAME: snapshot_probabilities
        run: |
          set -euo pipefail
          TITLE="[scheduler] ${JOB_NAME} failed"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --state open --search "\"${TITLE}\" in:title" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "Failed again: ${RUN_URL}"
          else
            gh issue create --repo "${{ github.repository }}" --title "$TITLE" \
              --body "The scheduled **${JOB_NAME}** job failed. Run: ${RUN_URL}

          This issue is reused (commented on, not duplicated) for future failures of the same job, until it's closed."
          fi

  # ---- daily 03:30: ledger integrity ops (DB + Storage only, no API) ---------
  # ROADMAP.md §4 item 5, migration 0007 -- nightly private full-table backup
