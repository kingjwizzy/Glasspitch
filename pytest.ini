[pytest]
# Run from the repo root: `python -m pytest`.
# pythonpath = . makes the `jobs` package importable (the jobs run as
# `python -m jobs.<name>`), so tests use `from jobs.x import ...`.
pythonpath = .
testpaths = jobs/tests
markers =
    integration: exercises a REAL local Postgres (supabase CLI, migrations 0001->0007 applied from scratch) -- trigger/CHECK/RLS/RPC behaviour, not mocks. Opt-in only: excluded from the default run (see addopts below); the CI "jobs-integration" job runs `pytest -m integration` against a `supabase start` stack. Authored in jobs/tests/ by test-engineer.
# Default run (`python -m pytest`, and CI's plain jobs-tests job) stays
# network/DB-free; integration tests are opt-in via `-m integration` (an
# explicit -m on the command line overrides this default).
addopts = -m "not integration"
